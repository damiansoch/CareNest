# CareNest — Render Blueprint
# Deploy via: Render Dashboard → New → Blueprint → connect repo
#
# NOTE: Celery worker + beat run inside the same container as gunicorn (free-tier constraint).
# To run them as separate services, upgrade workers to the "Starter" plan.

databases:
  - name: carenest-db
    plan: free
    databaseName: carenest
    user: carenest

services:
  # ─── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: carenest-redis
    plan: free
    ipAllowList: []

  # ─── Django Backend (+ Celery worker + beat via start.sh) ───────────────────
  - type: web
    name: carenest-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        sync: false  # Set manually in Render dashboard
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: carenest-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: carenest-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://carenest-frontend-9rww.onrender.com"
      - key: FRONTEND_URL
        value: "https://carenest-frontend-9rww.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: EMAIL_HOST
        value: smtp.resend.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        value: resend
      - key: EMAIL_HOST_PASSWORD
        sync: false  # Set to your Resend API key in Render dashboard
      - key: DEFAULT_FROM_EMAIL
        value: noreply@carenest.app

  # ─── Next.js Frontend ────────────────────────────────────────────────────────
  - type: web
    name: carenest-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: "https://carenest-backend-u9tv.onrender.com/api/v1"
